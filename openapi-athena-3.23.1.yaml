    GatewaySqlExecutionRequest:
      type: object
      description: Driver-agnostic SQL execution payload used by `/query/sql` and `/gateway/sql`.
      required:
      - query
      - driver
      - db_name
      properties:
        query:
          type: string
        driver:
          type: string
          enum:
          - athena
          - postgresql
          - supabase
          - d1
          - cloudflare-d1
          - athena-d1
        db_name:
          type: string
        schema_name:
          type: string
          description: Optional schema override; supported only when `driver` is `postgresql`.
    D1MigrationDialect:
      type: string
      enum:
      - postgresql
      description: Source SQL dialect supported by the migration converter.
    D1MigrationAction:
      type: string
      enum:
      - converted
      - skipped
      - warning
    D1MigrationSourceRange:
      type: object
      required:
      - statementIndex
      - startLine
      - endLine
      - startColumn
      - endColumn
      properties:
        statementIndex:
          type: integer
          format: int32
        startLine:
          type: integer
          format: int32
        endLine:
          type: integer
          format: int32
        startColumn:
          type: integer
          format: int32
        endColumn:
          type: integer
          format: int32
    D1MigrationDiagnostic:
      type: object
      required:
      - code
      - message
      - statementIndex
      - sourceRange
      properties:
        code:
          type: string
        message:
          type: string
        statementIndex:
          type: integer
          format: int32
        sourceRange:
          $ref: '#/components/schemas/D1MigrationSourceRange'
    D1MigrationPlanEntry:
      type: object
      required:
      - action
      - statementIndex
      - sourceRange
      - sourceSql
      - targetSql
      - applyOrder
      properties:
        action:
          $ref: '#/components/schemas/D1MigrationAction'
        statementIndex:
          type: integer
          format: int32
        sourceRange:
          $ref: '#/components/schemas/D1MigrationSourceRange'
        sourceSql:
          type: string
        targetSql:
          type: string
        applyOrder:
          type: integer
          format: int32
    D1MigrationSourceMeta:
      type: object
      required:
      - statementCount
      - fingerprint
      - estimatedApplyOrder
      properties:
        statementCount:
          type: integer
          format: int32
        fingerprint:
          type: string
        estimatedApplyOrder:
          type: array
          items:
            type: integer
            format: int32
    D1MigrationRequest:
      type: object
      required:
      - driver
      - dbName
      properties:
        driver:
          description: |
            D1-compatible gateway driver alias.
            `athena-d1` and `d1` map to `cloudflare-d1`.
          type: string
          enum:
          - d1
          - cloudflare-d1
          - athena-d1
          example: cloudflare-d1
        dbName:
          description: Logical client/database name used for D1 binding resolution.
          type: string
        schemaSql:
          description: Raw PostgreSQL schema/DML text for conversion.
          type: string
        files:
          description: Optional fallback source list when schemaSql is empty.
          type: array
          items:
            type: string
        statements:
          description: Optional explicit statements list when schemaSql is empty.
          type: array
          items:
            type: string
        dialect:
          description: Source SQL dialect for conversion (currently PostgreSQL only).
          $ref: '#/components/schemas/D1MigrationDialect'
          default: postgresql
        dryRun:
          description: |
            `true` (default) returns preview only; `false` executes converted statements.
          type: boolean
          default: true
        strict:
          description: Strict mode rejects unsupported constructs as errors by default.
          type: boolean
          default: true
        batchSize:
          description: Optional batch size for execution mode; minimum 1.
          type: integer
          format: int32
          minimum: 1
          nullable: true
    D1MigrationPreviewResponse:
      type: object
      description: |
        Preview-mode response with converted SQL and detailed migration diagnostics.

        Conversion mapping:

        | PostgreSQL construct | D1 conversion |
        | --- | --- |
        | `serial`, `bigserial`, `smallserial`, `IDENTITY` | `integer [AUTOINCREMENT]` |
        | `uuid` | `text` |
        | `json`, `jsonb` | `text` |
        | `numeric`, `decimal` | `real` |
        | array types (`_type`, `type[]`) | `text` |
        | `enum`, `domain`, custom scalar types | `text` |
        | timestamp / temporal types | `text` |
        | index and foreign-key clauses | preserved syntactically (`ddl.index`, `ddl.foreign_key`) |
      required:
      - status
      - originalSql
      - convertedSql
      - statements
      - warnings
      - errors
      - sourceMeta
      properties:
        status:
          type: string
          example: preview
        originalSql:
          type: string
        convertedSql:
          type: string
        statements:
          type: array
          items:
            $ref: '#/components/schemas/D1MigrationPlanEntry'
        warnings:
          type: array
          items:
            $ref: '#/components/schemas/D1MigrationDiagnostic'
        errors:
          type: array
          items:
            $ref: '#/components/schemas/D1MigrationDiagnostic'
        sourceMeta:
          $ref: '#/components/schemas/D1MigrationSourceMeta'
    D1MigrationPreview:
      allOf:
      - $ref: '#/components/schemas/D1MigrationPreviewResponse'
    D1MigrationAppliedStatementResult:
      type: object
      required:
      - statementIndex
      - sourceSql
      - targetSql
      - batchIndex
      - status
      properties:
        statementIndex:
          type: integer
          format: int32
        sourceSql:
          type: string
        targetSql:
          type: string
        batchIndex:
          type: integer
          format: int32
        rowsAffected:
          type: integer
          format: int64
          nullable: true
        durationMs:
          type: integer
          format: int64
          nullable: true
        status:
          type: string
    D1MigrationExecutionResponse:
      type: object
      description: |
        Execution-mode response when `dryRun=false`.

        Conversion mapping:

        | PostgreSQL construct | D1 conversion |
        | --- | --- |
        | `serial`, `bigserial`, `smallserial`, `IDENTITY` | `integer [AUTOINCREMENT]` |
        | `uuid` | `text` |
        | `json`, `jsonb` | `text` |
        | `numeric`, `decimal` | `real` |
        | array types (`_type`, `type[]`) | `text` |
        | `enum`, `domain`, custom scalar types | `text` |
        | timestamp / temporal types | `text` |
        | index and foreign-key clauses | preserved syntactically; compatibility warnings may appear (`ddl.index`, `ddl.foreign_key`) |
      required:
      - status
      - originalSql
      - convertedSql
      - perStatementResults
      - warnings
      - errors
      properties:
        status:
          type: string
          example: applied
        originalSql:
          type: string
        planId:
          type: string
          nullable: true
        convertedSql:
          type: string
        perStatementResults:
          type: array
          items:
            $ref: '#/components/schemas/D1MigrationAppliedStatementResult'
        warnings:
          type: array
          items:
            $ref: '#/components/schemas/D1MigrationDiagnostic'
        errors:
          type: array
          items:
            $ref: '#/components/schemas/D1MigrationDiagnostic'
    D1MigrationUnsupportedFeature:
      type: object
      required:
      - code
      - message
      - sourceRange
      properties:
        code:
          type: string
        message:
          type: string
        sourceRange:
          $ref: '#/components/schemas/D1MigrationSourceRange'
        suggestion:
          type: string
          nullable: true
    D1MigrationConversion:
      type: object
      required:
      - convertedSql
      - originalSql
      - statementCount
      - estimatedApplyOrder
      - statements
      - warnings
      - errors
      - sourceMeta
      properties:
        convertedSql:
          type: string
        originalSql:
          type: string
        statementCount:
          type: integer
          format: int32
        estimatedApplyOrder:
          type: array
          items:
            type: integer
            format: int32
        statements:
          type: array
          items:
            $ref: '#/components/schemas/D1MigrationPlanEntry'
        warnings:
          type: array
          items:
            $ref: '#/components/schemas/D1MigrationDiagnostic'
        errors:
          type: array
          items:
            $ref: '#/components/schemas/D1MigrationDiagnostic'
        sourceMeta:
          $ref: '#/components/schemas/D1MigrationSourceMeta'
    D1MigrationExecutionResult:
      allOf:
      - $ref: '#/components/schemas/D1MigrationExecutionResponse'
    GatewayRpcFilterOperator:
      type: string
      enum:
      - eq
      - neq
      - gt
      - gte
      - lt
      - lte
      - in
      - like
      - ilike
      - is
      description: Filter operator for RPC post-processing (JSON may use alias `i_like` for ilike)
    GatewayRpcFilter:
      type: object
      required:
      - column
      - operator
      properties:
        column:
          type: string
        operator:
          $ref: '#/components/schemas/GatewayRpcFilterOperator'
        value:
          description: JSON value compared against the column (default null)
          nullable: true
    GatewayRpcOrder:
      type: object
      required:
      - column
      properties:
        column:
          type: string
        ascending:
          type: boolean
          default: true
    GatewayRpcRequest:
      type: object
      description: Structured RPC invocation payload for Postgres function execution and optional row shaping.
      required:
      - function
      properties:
        function:
          type: string
          description: Function name (or `schema.function` when schema is `public`)
        function_name:
          type: string
          description: Alias of `function` accepted in JSON
        schema:
          type: string
          default: public
        args:
          type: object
          additionalProperties: true
        select:
          type: string
          description: Comma-separated columns for SELECT over RPC result
        filters:
          type: array
          items:
            $ref: '#/components/schemas/GatewayRpcFilter'
        count:
          type: string
          description: Set to `exact` to include an exact row count
        limit:
          type: integer
          format: int64
        offset:
          type: integer
          format: int64
        order:
          $ref: '#/components/schemas/GatewayRpcOrder'
    UpsertFunctionRequest:
      type: object
      required:
      - ddl
      properties:
        ddl:
          type: string
          description: CREATE OR REPLACE FUNCTION ... DDL validated server-side
    DropFunctionRequest:
      type: object
      required:
