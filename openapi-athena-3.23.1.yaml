      summary: WebSocket gateway contract
      description: Returns rollout metadata and the current WebSocket gateway message contract.
      responses:
        '200':
          description: WebSocket gateway contract metadata
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Athena WebSocket gateway scaffold
                  data:
                    type: object
                    properties:
                      transport:
                        type: string
                        example: wss
                      path:
                        type: string
                        example: /wss/gateway
                      state:
                        type: string
                        example: scaffolded
                      notes:
                        type: array
                        items:
                          type: string
                      actions:
                        type: array
                        items:
                          type: string
                        example:
                        - gateway.fetch
                        - gateway.insert
                        - gateway.update
                        - gateway.delete
                        - gateway.query
        '500':
          $ref: '#/components/responses/DefaultServerError5xx'
  /docs:
