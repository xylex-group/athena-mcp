          content_type:
            type: string
            nullable: true
          cache_control:
            type: string
            nullable: true
          content_disposition:
            type: string
            nullable: true
          content_encoding:
            type: string
            nullable: true
          content_language:
            type: string
            nullable: true
          metadata:
            type: object
            nullable: true
            additionalProperties:
              type: string
    StorageCreateFolderRequest:
      allOf:
      - $ref: '#/components/schemas/StorageS3Credentials'
