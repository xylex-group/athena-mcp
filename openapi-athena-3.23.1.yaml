  /management/extensions/install:
    post:
      summary: Install a Postgres extension
      description: |
        Installs an allowlisted Postgres extension on the selected `X-Athena-Client` database.
        Requires a client-bound API key with `management.extensions.write`. Audit rows require `public.database_audit_log` on the gateway logging Postgres database.
      parameters:
      - in: header
        name: X-Athena-Client
        required: true
        schema:
          type: string
      - in: header
        name: apikey
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - extension_name
              properties:
                extension_name:
                  type: string
                  description: Extension to install (allowlisted).
                  example: pgcrypto
                if_not_exists:
                  type: boolean
                  default: false
      responses:
        '200':
          description: Extension installed
        '400':
          description: Invalid payload or extension is not allowlisted
        '401':
          description: Missing or invalid API key
        '403':
          description: Missing management.extensions.write or key is not client-bound
        '503':
          description: public.database_audit_log is missing on the gateway logging database, or the logging store is unavailable
  /gateway/data:
    post:
      summary: Legacy alias for `/gateway/fetch`
      description: |
        Mirrors `/gateway/fetch` for clients still calling `/gateway/data` with the same payload/response envelope.

        Supports `X-Athena-Client` or direct PostgreSQL URI headers (`x-pg-uri` preferred; `x-athena-jdbc-url` / `x-jdbc-url` compatibility).
      parameters:
      - in: header
        name: X-User-Id
        schema:
          type: string
      - in: header
        name: X-Athena-Client
        description: Registered Athena client name. Optional when direct PostgreSQL URI headers are provided.
        schema:
          type: string
      - in: header
        name: x-pg-uri
        description: Preferred direct PostgreSQL URI (`postgres://...` or `jdbc:postgresql://...`).
        schema:
          type: string
      - in: header
        name: x-athena-jdbc-url
        description: Compatibility direct PostgreSQL URI header.
        schema:
          type: string
      - in: header
        name: x-jdbc-url
        description: Compatibility direct PostgreSQL URI header.
        schema:
          type: string
      - in: header
        name: X-Strip-Nulls
        schema:
          type: string
      - in: header
        name: apikey
        schema:
          type: string
      - in: header
        name: x-api-key
        description: optional API key mirror of the `apikey` header
        schema:
          type: string
      - in: header
        name: x-supabase-url
        description: Required when X-Athena-Client is custom_supabase
        schema:
          type: string
          format: uri
      - in: header
        name: x-supabase-key
        description: Required when X-Athena-Client is custom_supabase
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                view_name:
                  type: string
                table_name:
                  type: string
                schema_name:
                  type: string
                  description: Optional schema override (defaults to public search_path behavior).
                columns:
                  oneOf:
                  - type: array
                    items:
                      type: string
                  - type: string
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      eq_column:
                        type: string
                      eq_value:
                        type: string
                limit:
                  type: integer
                current_page:
                  type: integer
                page_size:
                  type: integer
                offset:
                  type: integer
                total_pages:
                  type: integer
                strip_nulls:
                  type: boolean
                group_by:
                  type: string
                  description: Column name to group results by
                time_granularity:
                  type: string
                  enum:
                  - day
                  - hour
                  - minute
                  description: Time granularity for grouping timestamp data
                aggregation_column:
                  type: string
                  description: Column to aggregate (required when using aggregation_strategy)
                aggregation_strategy:
                  type: string
                  enum:
                  - cumulative_sum
                  description: Aggregation strategy to apply (requires aggregation_column)
                aggregation_dedup:
                  type: boolean
                  description: Whether to deduplicate during aggregation
                sortBy:
                  type: object
                  description: Optional sort (camelCase). Use sort_by for snake_case.
                  properties:
                    field:
                      type: string
                    direction:
                      type: string
                      enum:
                      - asc
                      - desc
                      - ascending
                      - descending
                sort_by:
                  type: object
                  description: Optional sort (snake_case). Same shape as sortBy.
                  properties:
                    field:
                      type: string
                    direction:
                      type: string
                      enum:
                      - asc
                      - desc
                      - ascending
                      - descending
              required:
              - conditions
      responses:
        '200':
          description: OK
        '400':
          description: Bad request
        '500':
          description: Internal error
  /data:
    get:
      summary: Fetch data via GET
      description: |
        Compatibility GET wrapper for fetch semantics. Converts query string filters and paging inputs into
        an internal fetch-style request.

        Use `sort_by`/`sort_direction` for simple ordering and the aggregation query parameters for grouped output.
      tags:
      - Gateway
      parameters:
      - in: query
        name: view
        required: true
        schema:
          type: string
      - in: query
        name: eq_column
        required: true
        schema:
          type: string
      - in: query
        name: eq_value
        required: true
        schema:
          type: string
      - in: query
        name: columns
        schema:
          type: string
      - in: query
        name: limit
        schema:
          type: integer
      - in: query
        name: current_page
        schema:
          type: integer
      - in: query
        name: page_size
        schema:
          type: integer
      - in: query
        name: offset
        schema:
          type: integer
      - in: query
        name: total_pages
        schema:
          type: integer
      - in: query
        name: strip_nulls
        schema:
          type: boolean
      - in: query
        name: sort_by
        schema:
          type: string
        description: Column name to sort by (forwarded as sortBy.field in the internal POST)
      - in: query
        name: sort_direction
        schema:
          type: string
          enum:
          - asc
          - desc
          - ascending
          - descending
        description: Sort direction (default asc)
      - in: query
        name: group_by
        schema:
          type: string
        description: Column name to group results by
      - in: query
        name: time_granularity
        schema:
          type: string
          enum:
          - day
          - hour
          - minute
        description: Time granularity for grouping timestamp data
      - in: query
        name: aggregation_column
        schema:
          type: string
        description: Column to aggregate (required when using aggregation_strategy)
      - in: query
        name: aggregation_strategy
        schema:
          type: string
          enum:
          - cumulative_sum
        description: Aggregation strategy to apply (requires aggregation_column)
      - in: query
        name: aggregation_dedup
        schema:
          type: boolean
        description: Whether to deduplicate during aggregation
      - in: header
        name: X-User-Id
        schema:
          type: string
      - in: header
        name: X-Athena-Client
        schema:
          type: string
      - in: header
        name: X-Strip-Nulls
        schema:
          type: string
      - in: header
        name: apikey
        schema:
          type: string
      - in: header
        name: x-api-key
        description: optional API key mirror of the `apikey` header
        schema:
          type: string
      - in: header
        name: x-supabase-url
        description: Optional custom Supabase URL when X-Athena-Client is custom_supabase
        schema:
          type: string
          format: uri
      - in: header
        name: x-supabase-key
        description: Optional custom Supabase key when X-Athena-Client is custom_supabase
        schema:
          type: string
      responses:
        '200':
          description: OK
        '400':
          description: Bad request
        '500':
          description: Internal error
  /gateway/deferred/{request_id}:
    get:
      summary: Fetch deferred request status
      description: |
        Returns the current state of a deferred gateway request (`queued`, `running`, `completed`, `failed`, etc.)
        together with available execution metadata.
      tags:
      - Gateway
      parameters:
