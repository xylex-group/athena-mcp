        required:
        - key
        properties:
          key:
            type: string
          content_type:
            type: string
            nullable: true
    StorageBucketCorsRequest:
      allOf:
      - $ref: '#/components/schemas/StorageS3Credentials'
    StorageSetBucketCorsRequest:
      allOf:
      - $ref: '#/components/schemas/StorageS3Credentials'
      - type: object
        required:
        - rules
        properties:
          rules:
            type: array
            items:
              type: object
              required:
              - allowed_origins
              - allowed_methods
              properties:
                allowed_origins:
                  type: array
                  items:
                    type: string
                allowed_methods:
                  type: array
                  items:
                    type: string
                allowed_headers:
                  type: array
                  items:
                    type: string
                expose_headers:
                  type: array
                  items:
                    type: string
                max_age_seconds:
                  type: integer
                  format: int32
                  nullable: true
    TypesenseConnection:
      type: object
