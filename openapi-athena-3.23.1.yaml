      - in: header
        name: apikey
        schema:
          type: string
      - in: header
        name: x-api-key
        schema:
          type: string
      responses:
        '200':
          description: RPC result rows (`data` + optional `count`)
          content:
            application/json:
              schema:
                type: object
                required:
                - data
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                  count:
                    type: integer
                    format: int64
        '400':
          description: Invalid query string
        '401':
          description: Unauthorized
        '500':
          description: Database or internal error
    post:
      summary: Compatibility RPC endpoint for Postgres functions
      description: |
        Body is either a plain JSON object of named arguments for `function_name`, or a full `GatewayRpcRequest`-shaped wrapper (`function`, `schema`, `args`, `filters`, etc.).
      parameters:
      - name: function_name
        in: path
        required: true
        schema:
          type: string
      - in: header
        name: X-Athena-Client
        required: true
        schema:
          type: string
      - in: header
        name: apikey
        schema:
          type: string
      - in: header
        name: x-api-key
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
              - $ref: '#/components/schemas/GatewayRpcRequest'
              - type: object
                additionalProperties: true
                description: Bare argument object when not using wrapper fields
      responses:
        '200':
          description: RPC result rows
          content:
            application/json:
              schema:
                type: object
                required:
                - data
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                  count:
                    type: integer
                    format: int64
        '400':
          description: Invalid body
        '401':
          description: Unauthorized
        '500':
          description: Database or internal error
  /public/{route_key}/{op}:
    post:
      summary: Dispatch a public route alias to gateway operations
      description: Resolves a configured public route key to a provisioned Athena client and forwards to gateway query/fetch/insert/update/delete.
      parameters:
      - in: path
        name: route_key
        required: true
