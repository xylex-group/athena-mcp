          format: int64
          nullable: true
        source_client_name:
          type: string
          nullable: true
        source_schema_name:
          type: string
          nullable: true
        source_table_name:
          type: string
          nullable: true
        q:
          type: string
        query_by:
          type: array
          nullable: true
          items:
            type: string
        filter_by:
          type: string
          nullable: true
        sort_by:
          type: string
          nullable: true
        page:
