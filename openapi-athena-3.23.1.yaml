      - run_id
      - status
      - collection_name
      - source_rows
      - imported_count
      - failed_count
      - duration_ms
      - progress_total_kind
      - manifest_processed_rows
      - resumed
      - result_preview
      properties:
        job_id:
          type: integer
          format: int64
        run_id:
          type: integer
          format: int64
        status:
          type: string
        collection_name:
          type: string
        source_rows:
          type: integer
          format: int32
        imported_count:
          type: integer
          format: int32
        failed_count:
          type: integer
          format: int32
        duration_ms:
          type: integer
          format: int64
        retry_attempt_count:
          type: integer
          format: int32
          nullable: true
        rollback_attempted:
          type: boolean
          nullable: true
        rollback_status:
          type: string
          nullable: true
