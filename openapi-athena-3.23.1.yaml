components:
  responses:
    DefaultServerError5xx:
      description: Internal server error (or other 5xx). Standard envelope with status, message, and error.
      content:
        application/json:
          schema:
            type: object
            required:
            - status
            - message
            - error
            properties:
              status:
                type: string
                example: error
              code:
                type: string
                description: Optional machine-readable Athena error code when the failure maps to the shared registry.
              error_number:
                type: integer
                format: int32
                description: Optional stable Athena error number resolved from the shared registry.
              docs_url:
                type: string
                format: uri
                description: Optional docs URL for the stable Athena error number.
              message:
                type: string
                description: Human-readable summary
              error:
                type: string
                description: Error detail
  parameters:
    AdminApiKeyHeader:
      name: apikey
      in: header
      description: |
        The static admin key configured as `ATHENA_KEY_12`. Authorization headers (`Bearer <key>`), `X-API-Key`, `X-Athena-Key`, or `?api_key=` are also accepted.
      required: true
      schema:
        type: string
    XUserIdHeader:
      name: X-User-Id
      in: header
      required: false
      deprecated: true
      description: Deprecated trusted-server compatibility header. Primary Athena Storage auth resolves the actor from Athena Auth session context instead.
      schema:
        type: string
    XOrganizationIdHeader:
      name: X-Organization-Id
      in: header
      required: false
      deprecated: true
      description: Deprecated trusted-server compatibility header. Primary Athena Storage auth resolves the active organization from Athena Auth session context instead.
      schema:
        type: string
    WebhookIdParam:
      name: id
      in: path
      required: true
      description: Numeric primary key of a `gateway_webhook` row.
      schema:
        type: integer
        format: int64
    XAthenaAuthSessionTokenHeader:
      name: X-Athena-Auth-Session-Token
      in: header
      required: false
      description: Preferred Athena Auth session token forwarded by the SDK for managed storage authorization.
      schema:
        type: string
    StorageAuthCookieHeader:
      name: Cookie
      in: header
      required: false
      description: Optional cookie header. Athena Storage resolves athena-auth.session-token or athena-auth.session_token when present.
      schema:
        type: string
    StorageAuthorizationHeader:
      name: Authorization
      in: header
      required: false
      description: Optional bearer token forwarded by trusted SDK callers. When configured, Athena mirrors bearer auth into storage session resolution.
      schema:
        type: string
    XAthenaClientHeader:
      name: X-Athena-Client
      in: header
      required: true
      description: Logical Athena client name used to resolve the tenant-local Postgres pool for durable chat state.
      schema:
        type: string
    ChatAuthorizationHeader:
      name: Authorization
      in: header
      required: false
      description: Optional bearer token used by standard Athena auth resolution for chat routes.
      schema:
        type: string
    ChatCookieHeader:
      name: Cookie
      in: header
      required: false
      description: Optional session cookie header used by standard Athena auth resolution for chat routes.
      schema:
        type: string
    ChatRoomIdParam:
      name: room_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ChatMessageIdParam:
      name: message_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ChatUserIdParam:
      name: user_id
      in: path
      required: true
      schema:
        type: string
  schemas:
    ApiSuccessEnvelope:
      type: object
      description: |
        Standard JSON envelope for successful responses (`api_success` in `src/api/response.rs`).
      required:
      - status
      - message
      - data
      properties:
        status:
          type: string
          enum:
          - success
        message:
          type: string
        data:
          type: object
          additionalProperties: true
    ApiKeyRecord:
      type: object
      description: Persisted API key metadata plus resolved rights for listing/detail responses.
      properties:
        id:
          type: string
          format: uuid
        public_id:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        client_name:
          type: string
          nullable: true
        expires_at:
          type: string
          format: date-time
          nullable: true
        is_active:
          type: boolean
        last_used_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        rights:
          type: array
          items:
            type: string
    CreateApiKeyRequest:
      type: object
      description: Payload used to create a new API key and optional right grants.
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        client_name:
          type: string
          nullable: true
        expires_at:
          type: string
          format: date-time
          nullable: true
        rights:
          type: array
          items:
            type: string
        virgin_mode:
          type: boolean
          description: When true, the key starts with no per-key whitelist/blacklist and learns caller IPs until `virgin_until_n_requests` or `max_whitelist_ips` distinct IPs is reached, whichever comes first.
        virgin_until_n_requests:
          type: integer
          minimum: 0
          description: Lock the key after this many successful authentications; `0` disables the request counter and lets `max_whitelist_ips` drive lock-in.
        max_whitelist_ips:
          type: integer
          minimum: 0
          description: Hard cap on the per-key whitelist; `0` means unlimited.
        ip_whitelist:
          type: array
          items:
            type: string
          description: Initial per-key IP/CIDR whitelist entries. Ignored when `virgin_mode` is true.
        ip_blacklist:
          type: array
          items:
            type: string
          description: Initial per-key IP/CIDR blacklist entries. Ignored when `virgin_mode` is true.
      required:
      - name
    ApiKeyIpPolicyResponse:
      type: object
      description: Full per-key IP policy snapshot including virgin counters and rule lists.
      properties:
        policy:
          type: object
          properties:
            api_key_id:
              type: integer
              format: int64
            virgin_mode:
              type: boolean
            virgin_resolved:
              type: boolean
            virgin_resolved_at:
              type: string
              format: date-time
              nullable: true
            virgin_until_n_requests:
              type: integer
            virgin_request_count:
              type: integer
            max_whitelist_ips:
              type: integer
            whitelist:
              type: array
              items:
                $ref: '#/components/schemas/IpRuleRecord'
            blacklist:
              type: array
              items:
                $ref: '#/components/schemas/IpRuleRecord'
    IpRuleRecord:
      type: object
      properties:
        id:
          type: string
          format: uuid
        addr:
          type: string
          description: CIDR notation (single IPs rendered as `/32` or `/128`).
        label:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
    SeenIpRecord:
      type: object
      properties:
        id:
          type: string
          format: uuid
        addr:
          type: string
        first_seen_at:
          type: string
          format: date-time
        last_seen_at:
          type: string
          format: date-time
        hit_count:
          type: integer
          format: int64
        locked_in:
          type: boolean
    IpEntriesRequest:
      type: object
      description: Bulk add/remove request body for per-key and global IP lists.
      required:
      - addrs
      properties:
        addrs:
          type: array
          items:
            type: string
        label:
          type: string
          nullable: true
    GlobalIpRuleRequest:
      type: object
      required:
      - addr
      properties:
        addr:
          type: string
        client_name:
          type: string
          nullable: true
        label:
          type: string
          nullable: true
    VirginResetRequest:
      type: object
      properties:
        clear_seen:
          type: boolean
          description: When true, truncates the `api_key_ip_seen` rows for the key in addition to resetting counters.
    UpdateApiKeyRequest:
      type: object
      description: Partial update payload for API key metadata, lifecycle state, and right grants.
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        client_name:
          type: string
          nullable: true
        expires_at:
          type: string
          format: date-time
          nullable: true
        is_active:
          type: boolean
        rights:
          type: array
          items:
            type: string
    CreateApiKeyResponse:
      type: object
      description: One-time API key creation response that includes the plaintext key and stored record metadata.
      properties:
        api_key:
          type: string
          example: ath_abcdefghijklmnop.secret
        record:
          $ref: '#/components/schemas/ApiKeyRecord'
    ApiKeyRightRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
      required:
      - name
    ApiKeyRightRecord:
      type: object
      description: Canonical right definition assignable to API keys.
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ApiKeyConfigRequest:
      type: object
      properties:
        enforce_api_keys:
          type: boolean
      required:
      - enforce_api_keys
    ApiKeyGlobalConfig:
      type: object
      properties:
        enforce_api_keys:
          type: boolean
        updated_at:
          type: string
          format: date-time
    ApiKeyClientConfig:
      type: object
      properties:
        client_name:
          type: string
        enforce_api_keys:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ApiKeyConfigResponse:
      type: object
      properties:
        global:
          $ref: '#/components/schemas/ApiKeyGlobalConfig'
        clients:
          type: array
          items:
            $ref: '#/components/schemas/ApiKeyClientConfig'
    ApiKeyClientConfigRequest:
      type: object
      properties:
        enforce_api_keys:
          type: boolean
      required:
      - enforce_api_keys
    ApiKeyClientListResponse:
      type: object
      properties:
        clients:
          type: array
          items:
            $ref: '#/components/schemas/ApiKeyClientConfig'
    ClientsResponse:
      type: object
      description: Simple admin client-name listing response.
      properties:
        clients:
          type: array
          items:
            type: string
    AthenaClientRecord:
      type: object
      description: Database-backed Athena client catalog row used for runtime routing and management.
      properties:
        id:
          type: string
          format: uuid
        client_name:
          type: string
        description:
          type: string
          nullable: true
        pg_uri:
          type: string
          nullable: true
        pg_uri_env_var:
          type: string
          nullable: true
        config_uri_template:
          type: string
          nullable: true
        source:
          type: string
        is_active:
          type: boolean
        is_frozen:
          type: boolean
        last_synced_from_config_at:
          type: string
          format: date-time
          nullable: true
        last_seen_at:
          type: string
          format: date-time
          nullable: true
        metadata:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        deleted_at:
          type: string
          format: date-time
          nullable: true
    RuntimeAthenaClient:
      type: object
      description: In-memory runtime view of a registered client and live pool connectivity state.
      properties:
        client_name:
          type: string
        source:
          type: string
        description:
          type: string
          nullable: true
        pg_uri:
          type: string
          nullable: true
        pg_uri_env_var:
          type: string
          nullable: true
        config_uri_template:
          type: string
          nullable: true
        is_active:
          type: boolean
        is_frozen:
          type: boolean
        pool_connected:
          type: boolean
    SaveAthenaClientRequest:
