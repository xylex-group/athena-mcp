components:
  schemas:
    EmptyRequest:
      type: object
      description: Tool that does not accept arguments
      properties: {}
    ListMigrationsRequest:
      type: object
      properties:
        table_name:
          type: string
          description: Migrations table name (defaults to 'schema_migrations')
      required: []
    ApplyMigrationRequest:
      type: object
      properties:
        sql:
          type: string
          description: SQL migration to execute
        name:
          type: string
          description: Optional migration name or label
      required:
      - sql
    ExecuteSqlRequest:
      type: object
      properties:
        query:
          type: string
          description: Raw SQL query to execute
        driver:
          type: string
          enum: [ athena, postgresql, supabase ]
          description: Driver to use (defaults to 'postgresql')
        db_name:
          type: string
          description: Optional database name for /query/sql
      required:
      - query
    GetLogsRequest:
      type: object
      properties:
        table_name:
          type: string
          description: Logs table name (defaults to 'logs')
        limit:
          type: integer
          minimum: 1
          description: Maximum number of log rows to return (defaults to 100)
        level:
          type: string
          pattern: '^[a-zA-Z0-9_-]+$'
          description: Filter by log level (e.g. 'error', 'warn', 'info')
    GetColumnsRequest:
      type: object
      properties:
        table:
          type: string
          description: Table name (optionally schema-qualified) to describe
        schema:
          type: string
          description: Optional schema name when the table name is not schema-qualified
      required:
      - table
    ListTableMetadataRequest:
      type: object
      properties:
        table:
          type: string
          description: Table name (optionally schema-qualified)
        schema:
          type: string
          description: Optional schema name when the table name is not schema-qualified
      required:
      - table
    ListSchemasRequest:
      type: object
      properties:
        include_system:
          type: boolean
          description: Include pg_catalog and information_schema
    ListViewsRequest:
      type: object
      properties:
        schema:
          type: string
          description: Schema to limit view lookup
        include_materialized:
          type: boolean
          description: Include materialized views defined in pg_matviews
    GetRowByEqColumnRequest:
      type: object
      properties:
        table:
          type: string
          description: Table name to query (optionally schema-qualified)
        column:
          type: string
          description: Column name to match against
        value:
          oneOf:
          - type: string
          - type: number
          - type: boolean
          description: Value to compare (converted to string for Athena)
        schema:
          type: string
          description: Optional schema to override the table name
        limit:
          type: integer
          minimum: 1
          description: Maximum number of rows to return (defaults to 100)
      required:
      - table
      - column
      - value
    ListForeignKeysRequest:
      type: object
      properties:
        table:
          type: string
          description: Table name (optionally schema-qualified)
        schema:
          type: string
          description: Optional schema when table name is not schema-qualified
      required:
      - table
    GetTableSampleRequest:
      type: object
      properties:
        table:
          type: string
          description: Table name (optionally schema-qualified)
        schema:
          type: string
          description: Optional schema when table name is not schema-qualified
        limit:
          type: integer
          minimum: 1
          description: Number of rows to sample (defaults to 10)
      required:
      - table
    ListIndexesRequest:
      type: object
      properties:
        table:
          type: string
          description: Table name (optionally schema-qualified)
        schema:
          type: string
          description: Optional schema when table name is not schema-qualified
      required:
      - table
    SearchColumnsRequest:
      type: object
      properties:
        pattern:
          type: string
          description: Column or table name pattern (SQL LIKE, use % for wildcard)
        schema:
          type: string
          description: Optional schema to limit search
      required:
      - pattern
    GetRowByIdRequest:
      type: object
      properties:
        table:
          type: string
          description: Table name (optionally schema-qualified)
        id:
          oneOf:
          - type: string
          - type: number
          description: Primary key value (typically id)
        id_column:
          type: string
          description: Primary key column name (defaults to 'id')
        schema:
          type: string
          description: Optional schema when table name is not schema-qualified
        limit:
          type: integer
          minimum: 1
          description: Maximum rows to return (defaults to 100)
      required:
      - table
      - id
    ListAllTableMetadataRequest:
      type: object
      properties:
        schema:
          type: string
          description: Optional schema to limit to (default all user schemas)
    InsertRowRequest:
      type: object
      properties:
        table:
          type: string
          description: Table name (optionally schema-qualified)
        data:
          type: object
          additionalProperties:
            oneOf:
            - type: string
            - type: number
            - type: boolean
            - type: "null"
          description: Row data as key-value pairs
        schema:
          type: string
          description: Optional schema when table name is not schema-qualified
      required:
      - table
      - data
    DeleteRowRequest:
      type: object
      properties:
        table:
          type: string
          description: Table name (optionally schema-qualified)
        resource_id:
          type: string
          description: Primary key value of the row to delete
        schema:
          type: string
          description: Optional schema when table name is not schema-qualified
      required:
      - table
      - resource_id
    UpdateRowRequest:
      type: object
      properties:
        table:
          type: string
          description: Table name (optionally schema-qualified)
        set:
          type: object
          additionalProperties:
            oneOf:
            - type: string
            - type: number
            - type: boolean
            - type: "null"
          description: Column-value pairs to set
        where_column:
          type: string
          description: Column to match in WHERE clause
        where_value:
          oneOf:
          - type: string
          - type: number
          - type: boolean
          description: Value to match (converted to string)
        schema:
          type: string
          description: Optional schema when table name is not schema-qualified
      required:
      - table
      - set
      - where_column
      - where_value
    CreateTableToolRequest:
      type: object
      properties:
        table_name:
          type: string
          description: Table name to create
        schema_name:
          type: string
          description: Schema name (defaults to public)
        columns:
          type: array
          description: Optional column definitions
          items:
            type: object
        if_not_exists:
          type: boolean
          description: Compatibility flag accepted by Athena
      required:
      - table_name
    EditTableToolRequest:
      type: object
      properties:
        table_name:
          type: string
        schema_name:
          type: string
        operations:
          type: array
          items:
            type: object
      required:
      - table_name
      - operations
    DropTableToolRequest:
      type: object
      properties:
        table_name:
          type: string
        schema_name:
          type: string
        cascade:
          type: boolean
      required:
      - table_name
    DropColumnToolRequest:
      type: object
      properties:
        table_name:
          type: string
        column_name:
          type: string
        schema_name:
          type: string
        cascade:
          type: boolean
      required:
      - table_name
      - column_name
    CreateIndexToolRequest:
      type: object
      properties:
        table_name:
          type: string
        columns:
          type: array
          items:
            type: string
        schema_name:
          type: string
        index_name:
          type: string
        unique:
          type: boolean
        method:
          type: string
      required:
      - table_name
      - columns
    DropIndexToolRequest:
      type: object
      properties:
        index_name:
          type: string
        schema_name:
          type: string
      required:
      - index_name
    RunPipelineRequest:
      type: object
      properties:
        pipeline:
          type: string
        source:
          type: object
        transform:
          type: object
        sink:
          type: object
    CreateApiKeyToolRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        client_name:
          type: string
        expires_at:
          type: string
        rights:
          type: array
          items:
            type: string
      required:
      - name
    UpdateApiKeyToolRequest:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        client_name:
          type: string
        expires_at:
          type: string
        is_active:
          type: boolean
        rights:
          type: array
          items:
            type: string
      required:
      - id
    DeleteApiKeyToolRequest:
      type: object
      properties:
        id:
          type: string
      required:
      - id
    ApiKeyRightToolRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
      required:
      - name
    UpdateApiKeyRightToolRequest:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
      required:
      - id
    UpdateApiKeyConfigToolRequest:
      type: object
      properties:
        enforce_api_keys:
          type: boolean
      required:
      - enforce_api_keys
    SaveApiKeyClientToolRequest:
      type: object
      properties:
        client_name:
          type: string
        enforce_api_keys:
          type: boolean
      required:
      - client_name
      - enforce_api_keys
    DeleteApiKeyClientToolRequest:
      type: object
      properties:
        client_name:
          type: string
      required:
      - client_name
    SaveAthenaClientToolRequest:
      type: object
      properties:
        client_name:
          type: string
        description:
          type: string
        pg_uri:
          type: string
        pg_uri_env_var:
          type: string
        is_active:
          type: boolean
      required:
      - client_name
    FreezeAthenaClientToolRequest:
      type: object
      properties:
        client_name:
          type: string
        is_frozen:
          type: boolean
      required:
      - client_name
      - is_frozen
    ToggleSupabaseSslEnforcementToolRequest:
      type: object
      properties:
        enabled:
          type: boolean
        access_token:
          type: string
        project_ref:
          type: string
      required:
      - enabled
    GetRegistryEntryToolRequest:
      type: object
      properties:
        api_registry_id:
          type: string
      required:
      - api_registry_id
    ToolResult:
      type: object
      properties:
        content:
          type: array
          description: Content messages emitted by the tool (text/images/resources)
          items:
            $ref: '#/components/schemas/ToolContent'
        isError:
          type: boolean
          description: True when the tool execution failed
    ToolContent:
      type: object
      properties:
        type:
          type: string
          description: Content type (e.g. text, image, resource)
        text:
          type: string
          description: Textual result (available when type is text)
