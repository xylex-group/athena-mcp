openapi: 3.0.3
info:
  title: "Athena MCP Tools"
  version: 0.4.0
  description: "MCP tool definitions for the Athena MCP server. Each tool is exposed over POST endpoints so OpenAPI-aware clients can understand the tool inputs and outputs before invoking the corresponding MCP methods. Most request schemas also accept an optional `client` override when the server is configured with multiple allowed Athena clients."
servers:
  - url: https://athena-mcp.example.com/tools
paths:
  /tools/list_tables:
    post:
      summary: "List all tables"
      description: "List all tables available in the connected PostgreSQL database"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmptyRequest"
      responses:
        200:
          description: "Tool result payload"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResult"
  /tools/list_extensions:
    post:
      summary: "List installed PostgreSQL extensions"
      description: "List all installed PostgreSQL extensions. May return empty if the gateway does not expose extension metadata."
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmptyRequest"
      responses:
        200:
          description: "Tool result payload"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResult"
  /tools/list_migrations:
    post:
      summary: "List applied database migrations"
      description: "List applied database migrations"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ListMigrationsRequest"
      responses:
        200:
          description: "Tool result payload"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResult"
  /tools/apply_migration:
    post:
      summary: "Apply a SQL migration"
      description: "Apply a SQL migration against the connected database. Blocked when read_only mode is enabled."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplyMigrationRequest"
      responses:
        200:
          description: "Tool result payload"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResult"
  /tools/execute_sql:
    post:
      summary: "Execute an arbitrary SQL query"
      description: "Execute a raw SQL query against the connected database. Write operations are blocked when read_only mode is enabled."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExecuteSqlRequest"
      responses:
        200:
          description: "Tool result payload"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResult"
  /tools/get_logs:
    post:
      summary: "Retrieve recent logs"
      description: "Retrieve recent database or application logs"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GetLogsRequest"
      responses:
        200:
          description: "Tool result payload"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResult"
  /tools/get_columns_of_table:
    post:
      summary: "Describe columns using Athena's schema API"
      description: "Describe columns for a table using Athena's schema API"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GetColumnsRequest"
      responses:
        200:
          description: "Tool result payload"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResult"
  /tools/list_table_metadata:
    post:
      summary: "Return table metadata plus column defaults and nullability"
      description: "Return the full metadata for a table: schema name, table name, and each column's name, type, default value, and nullable flag"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ListTableMetadataRequest"
      responses:
        200:
          description: "Tool result payload"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResult"
  /tools/list_schemas:
    post:
      summary: "List visible database schemas"
      description: "List database schemas visible to the current Athena client"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ListSchemasRequest"
      responses:
        200:
          description: "Tool result payload"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResult"
  /tools/list_views:
    post:
      summary: "List visible views and materialized views"
      description: "List visible views (and optionally materialized views). Uses Athena schema API."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ListViewsRequest"
      responses:
        200:
          description: "Tool result payload"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResult"
  /tools/list_foreign_keys:
    post:
      summary: "List primary keys, foreign keys, and unique constraints"
      description: "List primary keys, foreign keys, and unique constraints for a table. Essential for understanding relationships and correct joins."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ListForeignKeysRequest"
      responses:
        200:
          description: "Tool result payload"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResult"
  /tools/get_table_sample:
    post:
      summary: "Sample rows from a table"
      description: "Sample rows from a table to understand its data shape. Quick alternative to writing SQL."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GetTableSampleRequest"
      responses:
        200:
          description: "Tool result payload"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResult"
  /tools/list_indexes:
    post:
      summary: "List index definitions for a table"
      description: "List index definitions for a table. Helps with performance and query design."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ListIndexesRequest"
      responses:
        200:
          description: "Tool result payload"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResult"
  /tools/search_columns:
    post:
      summary: "Find tables and columns by name pattern"
      description: "Find tables and columns by name pattern. Speeds up schema discovery."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SearchColumnsRequest"
      responses:
        200:
          description: "Tool result payload"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResult"
  /tools/get_row_by_id:
    post:
      summary: "Fetch rows by primary key value"
      description: "Fetch rows by primary key column value. Simplifies the common fetch-by-id use case."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GetRowByIdRequest"
      responses:
        200:
          description: "Tool result payload"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResult"
  /tools/list_all_table_metadata:
    post:
      summary: "Return metadata for all tables"
      description: "Return metadata for all tables in one call: schema, name, columns, types, defaults, nullable. Uses Athena schema API."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ListAllTableMetadataRequest"
      responses:
        200:
          description: "Tool result payload"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResult"
  /tools/insert_row:
    post:
      summary: "Insert a row"
      description: "Insert a row into a table. Blocked when read_only mode is enabled."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InsertRowRequest"
      responses:
        200:
          description: "Tool result payload"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResult"
  /tools/delete_row:
    post:
      summary: "Delete a row"
      description: "Delete a row by primary key (resource_id). Blocked when read_only mode is enabled."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeleteRowRequest"
      responses:
        200:
          description: "Tool result payload"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResult"
  /tools/update_row:
    post:
      summary: "Update rows"
      description: "Update rows matching a condition. Blocked when read_only mode is enabled."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRowRequest"
      responses:
        200:
          description: "Tool result payload"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResult"
  /tools/get_row_by_eq_column_of_table:
    post:
      summary: "Fetch rows for column equality conditions"
      description: "Fetch rows from a table where `column = value` using Athena's fetch endpoint"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GetRowByEqColumnRequest"
      responses:
        200:
          description: "Tool result payload"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResult"
  /tools/get_api_root:
    post:
      summary: "Fetch Athena API root metadata"
      description: "Fetch Athena API root metadata, including the advertised route list."
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmptyRequest"
      responses:
        200:
          description: "Tool result payload"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResult"
  /tools/ping:
    post:
      summary: "Run Athena health check"
      description: "Run the Athena health check endpoint."
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmptyRequest"
      responses:
        200:
          description: "Tool result payload"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResult"
  /tools/get_cluster_health:
    post:
      summary: "Inspect Athena cluster health"
      description: "Check Athena mirror reachability, latency, throughput, and version metadata."
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmptyRequest"
      responses:
        200:
          description: "Tool result payload"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResult"
  /tools/get_management_capabilities:
    post:
      summary: "Read management API capabilities"
      description: "List Athena management API capabilities and required rights for the current client."
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmptyRequest"
      responses:
        200:
          description: "Tool result payload"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResult"
  /tools/create_table:
    post:
      summary: "Create a managed table"
      description: "Create a managed table through Athena's management API. Blocked when read_only mode is enabled."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTableToolRequest"
      responses:
        200:
          description: "Tool result payload"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResult"
  /tools/edit_table:
    post:
      summary: "Edit a managed table"
      description: "Apply safe additive ALTER TABLE operations through Athena's management API. Blocked when read_only mode is enabled."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EditTableToolRequest"
      responses:
        200:
          description: "Tool result payload"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResult"
  /tools/drop_table:
    post:
      summary: "Drop a managed table"
      description: "Drop a managed table through Athena's management API. Blocked when read_only mode is enabled."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DropTableToolRequest"
      responses:
        200:
          description: "Tool result payload"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResult"
  /tools/drop_column:
    post:
      summary: "Drop a managed table column"
      description: "Drop a managed table column through Athena's management API. Blocked when read_only mode is enabled."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DropColumnToolRequest"
      responses:
        200:
          description: "Tool result payload"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResult"
  /tools/create_index:
    post:
      summary: "Create an index"
      description: "Create an index through Athena's management API. Blocked when read_only mode is enabled."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateIndexToolRequest"
      responses:
        200:
          description: "Tool result payload"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResult"
  /tools/drop_index:
    post:
      summary: "Drop an index"
      description: "Drop an index through Athena's management API. Blocked when read_only mode is enabled."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DropIndexToolRequest"
      responses:
        200:
          description: "Tool result payload"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResult"
  /tools/run_pipeline:
    post:
      summary: "Run an Athena pipeline"
      description: "Run a config-driven Athena pipeline (source -> transform -> sink)."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RunPipelineRequest"
      responses:
        200:
          description: "Tool result payload"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResult"
  /tools/list_available_clients:
    post:
      summary: "List configured Athena clients"
      description: "List the MCP server's configured Athena client allowlist and, when available, the remote Athena client catalog response."
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmptyRequest"
      responses:
        200:
          description: "Tool result payload"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResult"
  /tools/storage_credentials_list:
    post:
      summary: "storage credentials list"
      description: "List managed Athena storage credentials using the storage SDK binding."
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmptyRequest"
      responses:
        200:
          description: "Tool result payload"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResult"
  /tools/storage_catalog_list:
    post:
      summary: "storage catalog list"
      description: "List managed Athena storage catalogs."
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmptyRequest"
      responses:
        200:
          description: "Tool result payload"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResult"
  /tools/storage_catalog_create:
    post:
      summary: "storage catalog create"
      description: "Create a managed Athena storage catalog."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenericStorageInputRequest"
      responses:
        200:
          description: "Tool result payload"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResult"
  /tools/storage_catalog_update:
    post:
      summary: "storage catalog update"
      description: "Update a managed Athena storage catalog."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StorageCatalogUpdateRequest"
      responses:
        200:
          description: "Tool result payload"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResult"
  /tools/storage_catalog_delete:
    post:
      summary: "storage catalog delete"
      description: "Delete a managed Athena storage catalog."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StorageCatalogIdRequest"
      responses:
        200:
          description: "Tool result payload"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResult"
  /tools/storage_file_upload:
    post:
      summary: "storage file upload"
      description: "Create an upload URL for a managed Athena storage file."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenericStorageInputRequest"
      responses:
        200:
          description: "Tool result payload"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResult"
  /tools/storage_file_upload_many:
    post:
      summary: "storage file upload many"
      description: "Create multiple upload URLs for managed Athena storage files in one call."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenericStorageInputRequest"
      responses:
        200:
          description: "Tool result payload"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResult"
  /tools/storage_file_confirm_upload:
    post:
      summary: "storage file confirm upload"
      description: "Confirm that a managed Athena storage upload completed and persist any final metadata."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StorageFileOptionalInputRequest"
      responses:
        200:
          description: "Tool result payload"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResult"
  /tools/storage_file_upload_binary:
    post:
      summary: "storage file upload binary"
      description: "Upload small file content directly through MCP using either base64 or UTF-8 text."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StorageFileBinaryUploadRequest"
      responses:
        200:
          description: "Tool result payload"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResult"
  /tools/storage_file_list:
    post:
      summary: "storage file list"
      description: "List managed Athena storage files."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenericStorageInputRequest"
      responses:
        200:
          description: "Tool result payload"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResult"
  /tools/storage_file_search:
    post:
      summary: "storage file search"
      description: "Search managed Athena storage files."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenericStorageInputRequest"
      responses:
        200:
          description: "Tool result payload"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResult"
  /tools/storage_file_get:
    post:
      summary: "storage file get"
      description: "Get managed Athena storage file metadata."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StorageFileIdRequest"
      responses:
        200:
          description: "Tool result payload"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResult"
  /tools/storage_file_update:
    post:
      summary: "storage file update"
      description: "Update managed Athena storage file metadata."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StorageFileUpdateRequest"
      responses:
        200:
          description: "Tool result payload"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResult"
  /tools/storage_file_update_many:
    post:
      summary: "storage file update many"
      description: "Update many managed Athena storage files in one call."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenericStorageInputRequest"
      responses:
        200:
          description: "Tool result payload"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResult"
  /tools/storage_file_delete:
    post:
      summary: "storage file delete"
      description: "Delete a managed Athena storage file."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StorageFileIdRequest"
      responses:
        200:
          description: "Tool result payload"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResult"
  /tools/storage_file_delete_many:
    post:
      summary: "storage file delete many"
      description: "Delete many managed Athena storage files in one call."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenericStorageInputRequest"
      responses:
        200:
          description: "Tool result payload"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResult"
  /tools/storage_file_restore:
    post:
      summary: "storage file restore"
      description: "Restore a soft-deleted managed Athena storage file."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StorageFileIdRequest"
      responses:
        200:
          description: "Tool result payload"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResult"
  /tools/storage_file_purge:
    post:
      summary: "storage file purge"
      description: "Purge a managed Athena storage file permanently."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StorageFileIdRequest"
      responses:
        200:
          description: "Tool result payload"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResult"
  /tools/storage_file_copy:
    post:
      summary: "storage file copy"
      description: "Copy a managed Athena storage file."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StorageFileInputRequest"
      responses:
        200:
          description: "Tool result payload"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResult"
  /tools/storage_file_url:
    post:
      summary: "storage file url"
      description: "Generate a signed URL for a managed Athena storage file."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StorageFileUrlRequest"
      responses:
        200:
          description: "Tool result payload"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResult"
  /tools/storage_file_public_url:
    post:
      summary: "storage file public url"
      description: "Generate the public URL for a managed Athena storage file."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StorageFileIdRequest"
      responses:
        200:
          description: "Tool result payload"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResult"
  /tools/storage_file_proxy_url:
    post:
      summary: "storage file proxy url"
      description: "Generate the proxy URL for a managed Athena storage file."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StorageFileUrlRequest"
      responses:
        200:
          description: "Tool result payload"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResult"
  /tools/storage_file_proxy:
    post:
      summary: "storage file proxy"
      description: "Proxy a managed Athena storage file and return response metadata plus text when the proxied content is text-based."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StorageFileUrlRequest"
      responses:
        200:
          description: "Tool result payload"
